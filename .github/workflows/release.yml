name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nexview.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nexview
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nexview

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexview-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          mv nexview-x86_64-pc-windows-msvc/nexview.exe nexview-windows-x64.exe
          mv nexview-x86_64-unknown-linux-gnu/nexview nexview-linux-x64
          mv nexview-aarch64-apple-darwin/nexview nexview-macos-arm64
          chmod +x nexview-linux-x64 nexview-macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nexview-windows-x64.exe
            nexview-linux-x64
            nexview-macos-arm64
          generate_release_notes: true
