name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Clone rustmaps (for build)
        run: git clone --depth 1 https://github.com/FahrenheitResearch/rustmaps.git ../rustmaps
        shell: bash
      - name: Download Natural Earth shapefiles
        shell: bash
        run: |
          mkdir -p rustmaps_data
          cd rustmaps_data
          URLS=(
            "https://naciscdn.org/naturalearth/110m/physical/ne_110m_coastline.zip"
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_coastline.zip"
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_coastline.zip"
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_land.zip"
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_land.zip"
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_ocean.zip"
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_lakes.zip"
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_lakes.zip"
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_rivers_lake_centerlines.zip"
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_0_boundary_lines_land.zip"
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_1_states_provinces_lines.zip"
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_populated_places_simple.zip"
            "https://naciscdn.org/naturalearth/50m/cultural/ne_50m_urban_areas.zip"
          )
          for url in "${URLS[@]}"; do
            echo "Downloading $url"
            curl -sL -O "$url"
          done
          for f in *.zip; do unzip -o "$f"; done
          rm -f *.zip
      - name: Build
        run: cargo build --release --no-default-features --features local-maps
      - name: Package
        shell: bash
        run: |
          mkdir dist
          cp target/release/nexview.exe dist/
          cp -r rustmaps_data dist/rustmaps_data
          cd dist && 7z a ../NexView-Windows-x64.zip nexview.exe rustmaps_data
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: NexView-Windows-x64.zip

  build-macos-intel:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Clone rustmaps (for build)
        run: git clone --depth 1 https://github.com/FahrenheitResearch/rustmaps.git ../rustmaps
      - name: Download Natural Earth shapefiles
        run: |
          mkdir -p rustmaps_data && cd rustmaps_data
          for url in \
            "https://naciscdn.org/naturalearth/110m/physical/ne_110m_coastline.zip" \
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_coastline.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_coastline.zip" \
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_land.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_land.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_ocean.zip" \
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_lakes.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_lakes.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_rivers_lake_centerlines.zip" \
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_0_boundary_lines_land.zip" \
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_1_states_provinces_lines.zip" \
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_populated_places_simple.zip" \
            "https://naciscdn.org/naturalearth/50m/cultural/ne_50m_urban_areas.zip"; do
            echo "Downloading $url"
            curl -sL -O "$url"
          done
          for f in *.zip; do unzip -o "$f"; done
          rm -f *.zip
      - name: Build
        run: cargo build --release --no-default-features --features local-maps --target x86_64-apple-darwin
      - name: Create App Bundle
        run: |
          mkdir -p "NexView.app/Contents/MacOS"
          mkdir -p "NexView.app/Contents/Resources"
          cp target/x86_64-apple-darwin/release/nexview "NexView.app/Contents/MacOS/"
          cp -r rustmaps_data "NexView.app/Contents/Resources/rustmaps_data"
          cat > "NexView.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>NexView</string>
            <key>CFBundleDisplayName</key>
            <string>NexView</string>
            <key>CFBundleIdentifier</key>
            <string>com.fahrenheitresearch.nexview</string>
            <key>CFBundleVersion</key>
            <string>2.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>2.0.0</string>
            <key>CFBundleExecutable</key>
            <string>nexview</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
          </dict>
          </plist>
          PLIST
      - name: Sign App Bundle
        run: codesign --force --deep -s - "NexView.app"
      - name: Package DMG
        run: |
          hdiutil create -volname "NexView" -srcfolder "NexView.app" -ov -format UDZO NexView-macOS-Intel.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel-build
          path: NexView-macOS-Intel.dmg

  build-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Clone rustmaps (for build)
        run: git clone --depth 1 https://github.com/FahrenheitResearch/rustmaps.git ../rustmaps
      - name: Download Natural Earth shapefiles
        run: |
          mkdir -p rustmaps_data && cd rustmaps_data
          for url in \
            "https://naciscdn.org/naturalearth/110m/physical/ne_110m_coastline.zip" \
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_coastline.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_coastline.zip" \
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_land.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_land.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_ocean.zip" \
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_lakes.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_lakes.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_rivers_lake_centerlines.zip" \
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_0_boundary_lines_land.zip" \
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_1_states_provinces_lines.zip" \
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_populated_places_simple.zip" \
            "https://naciscdn.org/naturalearth/50m/cultural/ne_50m_urban_areas.zip"; do
            echo "Downloading $url"
            curl -sL -O "$url"
          done
          for f in *.zip; do unzip -o "$f"; done
          rm -f *.zip
      - name: Build
        run: cargo build --release --no-default-features --features local-maps
      - name: Create App Bundle
        run: |
          mkdir -p "NexView.app/Contents/MacOS"
          mkdir -p "NexView.app/Contents/Resources"
          cp target/release/nexview "NexView.app/Contents/MacOS/"
          cp -r rustmaps_data "NexView.app/Contents/Resources/rustmaps_data"
          cat > "NexView.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>NexView</string>
            <key>CFBundleDisplayName</key>
            <string>NexView</string>
            <key>CFBundleIdentifier</key>
            <string>com.fahrenheitresearch.nexview</string>
            <key>CFBundleVersion</key>
            <string>2.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>2.0.0</string>
            <key>CFBundleExecutable</key>
            <string>nexview</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST
      - name: Sign App Bundle
        run: codesign --force --deep -s - "NexView.app"
      - name: Package DMG
        run: |
          hdiutil create -volname "NexView" -srcfolder "NexView.app" -ov -format UDZO NexView-macOS-AppleSilicon.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm-build
          path: NexView-macOS-AppleSilicon.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev
      - name: Clone rustmaps (for build)
        run: git clone --depth 1 https://github.com/FahrenheitResearch/rustmaps.git ../rustmaps
      - name: Download Natural Earth shapefiles
        run: |
          mkdir -p rustmaps_data && cd rustmaps_data
          for url in \
            "https://naciscdn.org/naturalearth/110m/physical/ne_110m_coastline.zip" \
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_coastline.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_coastline.zip" \
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_land.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_land.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_ocean.zip" \
            "https://naciscdn.org/naturalearth/50m/physical/ne_50m_lakes.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_lakes.zip" \
            "https://naciscdn.org/naturalearth/10m/physical/ne_10m_rivers_lake_centerlines.zip" \
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_0_boundary_lines_land.zip" \
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_1_states_provinces_lines.zip" \
            "https://naciscdn.org/naturalearth/10m/cultural/ne_10m_populated_places_simple.zip" \
            "https://naciscdn.org/naturalearth/50m/cultural/ne_50m_urban_areas.zip"; do
            echo "Downloading $url"
            curl -sL -O "$url"
          done
          for f in *.zip; do unzip -o "$f"; done
          rm -f *.zip
      - name: Build
        run: cargo build --release --no-default-features --features local-maps
      - name: Package
        run: |
          mkdir dist
          cp target/release/nexview dist/
          cp -r rustmaps_data dist/rustmaps_data
          cd dist && tar czf ../NexView-Linux-x64.tar.gz nexview rustmaps_data
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: NexView-Linux-x64.tar.gz

  create-release:
    needs: [build-windows, build-macos-intel, build-macos-arm, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## NexView ${{ github.ref_name }} — Performance Edition

            ### New Features
            - **Multi-radar group animation** — Ctrl+Click radars to add to group, synced loop animation across all active radars with parallel S3 download
            - **Composite GIF export** — Export multi-radar groups as composited GIF animations (1920x1080)
            - **Bilinear interpolation renderer** — GR2Analyst-quality smooth rendering with gate and azimuth interpolation
            - **Dynamic resolution scaling** — Render resolution adapts to zoom level (1024/2048/4096px)
            - **3D cross-section view** — Perspective-projected vertical cross-section with drag-to-rotate, ground plane grid
            - **Custom color tables** — Load GR2Analyst (.pal) and RadarScope color table formats, 6 built-in presets
            - **Per-radar opacity** — Individual opacity sliders for each radar in multi-radar groups

            ### Improvements
            - **4-panel view** — Now uses smooth renderer, custom color tables, and dynamic resolution
            - **Cross-section click fix** — Tool clicks (cross-section, measure, sounding) no longer conflict with map panning
            - **Animation performance** — Eager texture pre-rendering, eliminated 25-50MB Level2File clones per frame
            - **Elevation locking** — Animation frames locked to frame 0 elevation angle, prevents tilt flickering
            - **Faster downloads** — 8 concurrent S3 downloads (up from 4)

            ### macOS Users
            If you see a Gatekeeper warning, right-click the app and select "Open", or run:
            ```
            xattr -cr /Applications/NexView.app
            ```

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 | `NexView-Windows-x64.zip` |
            | macOS Apple Silicon | `NexView-macOS-AppleSilicon.dmg` |
            | macOS Intel | `NexView-macOS-Intel.dmg` |
            | Linux x64 | `NexView-Linux-x64.tar.gz` |
          files: |
            artifacts/windows-build/NexView-Windows-x64.zip
            artifacts/macos-intel-build/NexView-macOS-Intel.dmg
            artifacts/macos-arm-build/NexView-macOS-AppleSilicon.dmg
            artifacts/linux-build/NexView-Linux-x64.tar.gz
